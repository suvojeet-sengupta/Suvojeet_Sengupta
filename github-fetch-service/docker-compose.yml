version: '3.8'

services:
  github-fetch-service:
    build: .
    container_name: github-fetch-service
    ports:
      - "5003:5003"
    restart: always
    volumes:
      - cache-data:/app/data
    environment:
      - PORT=5003
      - NODE_ENV=production
      - REPOS=suvojeet-sengupta/SuvMusic,suvojeet-sengupta/NoteNext,suvojeet-sengupta/Suvojeet_Sengupta
      - FETCH_INTERVAL_MINUTES=15
      - GITHUB_TOKEN= # Optional: Add GitHub PAT to prevent rate limits

volumes:
  cache-data:
